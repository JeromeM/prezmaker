name: Build Windows

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Install frontend dependencies
        run: |
          cd ui
          npm install

      - name: Build Tauri app
        run: cargo tauri build

      - name: List build output
        run: |
          Get-ChildItem -Recurse target/release/bundle/ -ErrorAction SilentlyContinue
          Get-ChildItem -Recurse src-tauri/target/release/bundle/ -ErrorAction SilentlyContinue
          Get-ChildItem -Recurse -Filter "*.msi" -ErrorAction SilentlyContinue
          Get-ChildItem -Recurse -Filter "*.exe" -Path target/ -ErrorAction SilentlyContinue

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prezmaker-windows
          path: |
            target/release/bundle/**/*
            src-tauri/target/release/bundle/**/*
